<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Manager</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-theme="light">

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <header>
        <div class="header-content">
            <h1>Todo Manager</h1>
            <button id="theme-toggle" class="icon-btn" title="Toggle theme">
                <span class="theme-icon">&#9789;</span>
            </button>
        </div>
    </header>

    <main class="container">

        <!-- Stats Dashboard -->
        <section id="stats-panel" class="card">
            <div class="stats-header" id="stats-toggle">
                <h2>Dashboard</h2>
                <span class="toggle-arrow">&#9660;</span>
            </div>
            <div id="stats-content" class="stats-content">
                <div class="stat-cards">
                    <div class="stat-card">
                        <span class="stat-number" id="stat-total">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                    <div class="stat-card stat-pending">
                        <span class="stat-number" id="stat-pending">0</span>
                        <span class="stat-label">Pending</span>
                    </div>
                    <div class="stat-card stat-progress">
                        <span class="stat-number" id="stat-in-progress">0</span>
                        <span class="stat-label">In Progress</span>
                    </div>
                    <div class="stat-card stat-completed">
                        <span class="stat-number" id="stat-completed">0</span>
                        <span class="stat-label">Completed</span>
                    </div>
                    <div class="stat-card stat-overdue">
                        <span class="stat-number" id="stat-overdue">0</span>
                        <span class="stat-label">Overdue</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="stat-rate">0%</span>
                        <span class="stat-label">Completion Rate</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Add / Edit Form -->
        <section id="todo-form" class="card">
            <h2 id="form-title">Add New Todo</h2>
            <form id="todo-form-el" autocomplete="off">
                <div class="form-row">
                    <input type="text" id="input-title" placeholder="What needs to be done?" required maxlength="200">
                </div>
                <div class="form-row">
                    <textarea id="input-description" placeholder="Description (optional)" rows="2"></textarea>
                </div>
                <div class="form-row form-row-inline">
                    <div class="form-group">
                        <label for="input-priority">Priority</label>
                        <select id="input-priority">
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="input-category">Category</label>
                        <input type="text" id="input-category" list="category-list" placeholder="e.g. Work">
                        <datalist id="category-list"></datalist>
                    </div>
                    <div class="form-group">
                        <label for="input-due-date">Due Date</label>
                        <input type="date" id="input-due-date">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" id="save-btn" class="btn btn-primary">Add Todo</button>
                    <button type="button" id="cancel-btn" class="btn btn-secondary" style="display:none;">Cancel</button>
                </div>
            </form>
        </section>

        <!-- Filters & Search -->
        <section id="filters" class="card">
            <div class="filters-row">
                <input type="search" id="search-input" placeholder="Search todos..." class="search-input">
                <select id="filter-status">
                    <option value="">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
                <select id="filter-priority">
                    <option value="">All Priority</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
                <select id="filter-category">
                    <option value="">All Categories</option>
                </select>
                <select id="sort-by">
                    <option value="created_at">Sort: Created</option>
                    <option value="due_date">Sort: Due Date</option>
                    <option value="priority">Sort: Priority</option>
                    <option value="title">Sort: Title</option>
                </select>
                <button id="sort-order-btn" class="btn btn-icon" title="Toggle sort order">&#8597;</button>
            </div>
            <div class="filters-actions">
                <span id="todo-count">0 todos</span>
                <button id="clear-completed-btn" class="btn btn-danger-outline">Clear Completed</button>
            </div>
        </section>

        <!-- Todo List -->
        <section id="todo-list">
            <div id="todo-items"></div>
            <div id="empty-state" class="empty-state" style="display:none;">
                <p>No todos found. Add one above!</p>
            </div>
        </section>

    </main>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay" style="display:none;">
        <div class="modal card">
            <h2>Edit Todo</h2>
            <form id="edit-form-el" autocomplete="off">
                <input type="hidden" id="edit-id">
                <div class="form-row">
                    <input type="text" id="edit-title" placeholder="Title" required maxlength="200">
                </div>
                <div class="form-row">
                    <textarea id="edit-description" placeholder="Description" rows="2"></textarea>
                </div>
                <div class="form-row form-row-inline">
                    <div class="form-group">
                        <label for="edit-status">Status</label>
                        <select id="edit-status">
                            <option value="pending">Pending</option>
                            <option value="in_progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-priority">Priority</label>
                        <select id="edit-priority">
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-category">Category</label>
                        <input type="text" id="edit-category" list="category-list" placeholder="e.g. Work">
                    </div>
                    <div class="form-group">
                        <label for="edit-due-date">Due Date</label>
                        <input type="date" id="edit-due-date">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-secondary modal-close">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
