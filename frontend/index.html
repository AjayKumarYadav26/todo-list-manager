<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>Todo List Manager</h1>
        <p>Track your tasks and see when each one was created.</p>
      </header>

      <section class="todo-form-card">
        <form id="todo-form" class="todo-form">
          <input id="todo-title" type="text" placeholder="Add a new todo" aria-label="Todo title" required />
          <button type="submit">Add Todo</button>
        </form>
      </section>

      <section>
        <div id="todo-list" class="todo-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="api.js"></script>
    <script src="components.js"></script>
    <script src="app.js"></script>
  </body>
</html>
